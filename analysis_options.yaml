include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    avoid_print: error
    public_member_api_docs: ignore

linter:
  rules:
    avoid_print: true
    prefer_final_locals: true
    require_trailing_commas: true
